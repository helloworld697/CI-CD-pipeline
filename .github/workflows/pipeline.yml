name: Deployment pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]
    types: [opened, synchronize]    

jobs:
  simple_deployment_pipeline:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./my-fullstack-app 

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies        
        run: npm run install:all
        
      - name: Check style
        run: npm run lint
#just to trigger this eslint test
      - name: Build
        run: npm run build
      
      - name: Run test
        run: npm test
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run E2E tests
        run: npm run test:e2e        
      
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: my-fullstack-app/playwright-report/

  deploy:      
        needs: [simple_deployment_pipeline]
        runs-on: ubuntu-latest
        if: ${{ github.event_name == 'push' && success() && !contains(join(github.event.commits.*.message, ' '), '#skip') }}
        steps:
          - name: Trigger Deployment
            run: curl ${{ secrets.RENDER_DEPLOY_HOOK }}  
        
  tag_release:
    needs: [deploy]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' && success() && !contains(join(github.event.commits.*.message, ' '), '#skip') }}  
    steps:
      - uses: actions/checkout@v4      
      - name: Create Tag
        uses: anothrNick/github-tag-action@1.71.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch

    # This comment is just to trigger the tag creation during PR merge.
      # - name: Notify Discord of Success
      #   uses: sarisia/actions-status-discord@v1.16.0
      #   if: success()
      #   with:
      #       severity: info
      #       text: A new version has been deployed successfully!
      #       webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}

  notify_success:
    needs: [Tag_release]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Discord Notification (Success)
        uses: sarisia/actions-status-discord@v1.16.0
        with:
          text: A new version has been deployed successfully!
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          description: |
            🚀 Deployment successful
            Repository: ${{ github.repository }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            Branch: ${{ github.ref_name }}

  notify_failure:
    needs: [tag_release]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Discord Notification (Failure)
        uses: sarisia/actions-status-discord@v1.16.0
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          description: |
            ❌ Pipeline failed
            Repository: ${{ github.repository }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            Branch: ${{ github.ref_name }}    